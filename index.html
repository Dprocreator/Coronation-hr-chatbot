<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coronation X — HR Assistant</title>
  <meta name="description" content="AI-powered HR assistant for Coronation X Limited employees.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="chat-app">

    <!-- WELCOME OVERLAY -->
    <div class="welcome-overlay" id="welcomeOverlay">
      <div class="welcome-icon">🏢</div>
      <div class="welcome-badge"><span class="ai-dot"></span> AI-Powered</div>
      <h1 class="welcome-title">Coronation X</h1>
      <button class="welcome-start-btn" id="startBtn">Start a Conversation</button>
    </div>

    <!-- HEADER -->
    <header class="chat-header">
      <div class="bot-avatar">
        <div class="bot-avatar-inner">🏢</div>
        <span class="bot-avatar-status"></span>
      </div>
      <div class="header-info">
        <div class="header-name">
          Coronation X HR
          <span class="header-ai-badge">AI</span>
        </div>
        <div class="header-status-text">Trained on Employee Handbook</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="themeToggle" title="Switch to light mode" aria-label="Toggle theme">🌙</button>
      </div>
    </header>


    <!-- MESSAGE AREA -->
    <main class="chat-messages" id="chatMessages" role="log" aria-live="polite"></main>

    <!-- INPUT AREA -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask about Coronation X policies…"
          autocomplete="off" aria-label="Type your message">
      </div>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>

    <div class="chat-footer">CORONATION X LIMITED · TRUST · INNOVATION · LEADERSHIP</div>
  </div>

  <script src="script.js"></script>
</body>

</html>
